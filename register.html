<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | EliteArch</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            /* إضافة خلفية منزل فخمة */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 0.9); /* خلفية بيضاء شفافة قليلاً لراحة العين */
            padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 380px; text-align: center;
            backdrop-filter: blur(5px); /* تأثير ضبابي للخلفية خلف المربع */
        }

        h2 { color: #333; margin-bottom: 30px; font-weight: 600; }
        
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        
        input {
            width: 100%; padding: 14px; 
            background: #fff;
            border: 1px solid #ddd; border-radius: 10px;
            color: #333; outline: none; box-sizing: border-box;
            transition: 0.3s;
        }

        /* عندما يكون الإدخال خاطئاً */
        input.invalid {
            border-color: #e74c3c !important;
            background-color: #fffafa;
        }

        /* رسالة الخطأ تحت الإيميل (مثل فيسبوك) */
        .error-hint {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none; /* مخفية حتى يحدث خطأ */
            font-weight: 500;
        }

        .password-toggle {
            position: absolute; right: 15px; top: 15px; 
            color: #999; cursor: pointer;
        }

        button {
            width: 100%; padding: 14px; 
            background: #1e3a8a; /* كحلي احترافي */
            border: none; border-radius: 10px; 
            color: white; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #0f172a; transform: translateY(-2px); }

        p { color: #555; font-size: 14px; margin-top: 20px; }
        a { color: #1e3a8a; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>
    <!-- أضفنا الأكشن والميثود -->
<form id="registerForm" action="register_process.php" method="POST">
    <div class="input-group">
        <!-- أضفنا name="email" -->
        <input type="email" id="email" name="email" placeholder="Email Address" required>
        <div id="emailError" class="error-hint">
            <i class="fas fa-exclamation-circle"></i> This email address is invalid.
        </div>
    </div>
    
    <div class="input-group">
        <!-- أضفنا name="password" -->
        <input type="password" id="password" name="password" placeholder="Choose Password" required>
        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
    </div>
    
    <!-- الزر سيقوم الآن بالإرسال تلقائياً -->
    <button type="submit">Sign Up</button>
</form>
   

    <p>Already a member? <a href="login.html">Login</a></p>
</div>

<script>
    const emailInput = document.getElementById('email');
    const emailError = document.getElementById('emailError');
    const togglePassword = document.querySelector('#togglePassword');
    const passwordField = document.querySelector('#password');

    // 1. وظيفة فحص الإيميل فوراً عند الكتابة (Real-time Validation)
    emailInput.addEventListener('input', function() {
        const emailValue = emailInput.value;
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // قاعدة فحص الإيميل

        if (emailValue === "") {
            emailError.style.display = 'none';
            emailInput.classList.remove('invalid');
        } else if (!emailPattern.test(emailValue)) {
            emailError.style.display = 'block'; // إظهار الرسالة
            emailInput.classList.add('invalid'); // تلوين الحقل بالأحمر
        } else {
            emailError.style.display = 'none';
            emailInput.classList.remove('invalid');
        }
    });

    // 2. إظهار وإخفاء كلمة السر
    togglePassword.addEventListener('click', function () {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });
</script>

</body>
</html>
