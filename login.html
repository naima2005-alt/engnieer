<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Welcome Back</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), 
                        url('https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 45px; border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 380px; text-align: center;
            backdrop-filter: blur(8px);
        }

        h2 { color: #1e293b; margin-bottom: 10px; font-size: 28px; font-weight: 700; }
        p.subtitle { color: #64748b; margin-bottom: 35px; font-size: 15px; }
        
        .input-field { position: relative; margin-bottom: 20px; text-align: left; }
        
        input {
            width: 100%; padding: 14px 15px; 
            background: #f8fafc;
            border: 1px solid #e2e8f0; border-radius: 12px;
            color: #1e293b; outline: none; box-sizing: border-box;
            transition: 0.3s ease;
            font-size: 15px;
        }

        input:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .fb-error-box {
            background: #be1e2d; color: white; font-size: 12px;
            padding: 8px 12px; border-radius: 4px; margin-top: 5px;
            display: none; position: relative;
        }

        .fb-error-box::before {
            content: ""; position: absolute; top: -10px; left: 15px;
            border-width: 5px; border-style: solid;
            border-color: transparent transparent #be1e2d transparent;
        }

        .eye-icon {
            position: absolute; right: 15px; top: 16px; 
            color: #94a3b8; cursor: pointer; transition: 0.3s;
        }

        .btn-login {
            width: 100%; padding: 14px; background: #1e293b;
            border: none; border-radius: 12px; color: white;
            font-weight: 600; font-size: 16px; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-login:hover { background: #334155; transform: translateY(-2px); }

        .footer-text { color: #64748b; font-size: 14px; margin-top: 25px; }
        .footer-text a { color: #3b82f6; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Please enter your details to login.</p>
    
    <form action="login_process.php" method="POST" id="loginForm">
        <div class="input-field">
            <input type="email" name="email" id="emailInput" placeholder="Email Address" required>
            <div id="emailError" class="fb-error-box">
                The email address you entered isn't valid.
            </div>
        </div>
        
        <div class="input-field">
            <input type="password" name="password" id="passInput" placeholder="Password" required>
            <i class="fas fa-eye eye-icon" id="eyeToggle"></i>
        </div>
        
        <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="footer-text">
        Don't have an account? <a href="register.html">Sign Up</a>
    </div>
</div>

<script>
    const emailInput = document.getElementById('emailInput');
    const emailError = document.getElementById('emailError');
    const eyeToggle = document.getElementById('eyeToggle');
    const passInput = document.getElementById('passInput');

    // كود إظهار الإشعار عند الخطأ
    emailInput.addEventListener('blur', function() {
        const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!pattern.test(emailInput.value) && emailInput.value !== "") {
            emailError.style.display = 'block';
        } else {
            emailError.style.display = 'none';
        }
    });

    emailInput.addEventListener('input', () => emailError.style.display = 'none');

    // تشغيل العين
    eyeToggle.addEventListener('click', function () {
        const isPassword = passInput.getAttribute('type') === 'password';
        passInput.setAttribute('type', isPassword ? 'text' : 'password');
        this.classList.toggle('fa-eye-slash');
    });
</script>

</body>
</html>
