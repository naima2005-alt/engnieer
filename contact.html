<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | EngineerCom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* خلفية فاتحة هادئة ومريحة للعين */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            overflow: hidden;
        }

        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            width: 440px;
            /* ظل ناعم ليعطي عمقاً للتصميم */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h2 { 
            color: #1a202c; 
            margin-bottom: 12px; 
            font-weight: 600; 
            font-size: 30px;
            letter-spacing: -0.5px;
        }
        
        p { 
            color: #718096; 
            margin-bottom: 35px; 
            font-size: 15px; 
            line-height: 1.6;
        }

        .input-box { position: relative; margin-bottom: 20px; text-align: left; }

        .input-box input, .input-box textarea {
            width: 100%;
            padding: 14px 18px;
            /* حقول فاتحة بحدود رمادية خفيفة */
            background: #f8fafc;
            border: 1.5px solid #edf2f7;
            outline: none;
            border-radius: 12px;
            color: #2d3748; /* لون الكتابة غامق للوضوح */
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-box input::placeholder, .input-box textarea::placeholder { 
            color: #a0aec0; 
        }

        .input-box textarea { height: 120px; resize: none; }

        /* تأثير عند التركيز على الحقل */
        .input-box input:focus, .input-box textarea:focus {
            background: #fff;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        /* رسالة الخطأ باللون الأحمر الواضح */
        #email-error {
            color: #e53e3e;
            font-size: 12px;
            margin-top: 7px;
            display: none;
            font-weight: 500;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            /* زر بلون أزرق فاتح واحترافي */
            background: #3182ce;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #2b6cb0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
        }

        .footer-link { margin-top: 25px; }
        .footer-link a { 
            color: #a0aec0; 
            text-decoration: none; 
            font-size: 13px; 
            transition: 0.3s;
        }
        .footer-link a:hover { color: #4a5568; }
    </style>
</head>
<body>

<div class="container">
    <h2>Contact Us 📩</h2>
    <p>Feel free to contact us anytime.<br>We will get back to you as soon as possible.</p>

    <form method="POST" action="contact.php">
        <div class="input-box">
            <input type="text" name="name" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <input type="email" name="email" id="email" placeholder="Email Address" required>
            <div id="email-error"><i class="fas fa-exclamation-circle"></i> Please enter a valid email address.</div>
        </div>

        <div class="input-box">
            <textarea name="message" placeholder="Message..." required></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>

    <div class="footer-link">
        <a href="index.html">← Back to Home</a>
    </div>
</div>

<script>
    const emailInput = document.getElementById('email');
    const emailError = document.getElementById('email-error');
    
    emailInput.addEventListener('input', function() {
        const pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if (emailInput.value.match(pattern) || emailInput.value === "") {
            emailError.style.display = "none";
            emailInput.style.borderColor = "#edf2f7";
        } else {
            emailError.style.display = "block";
            emailInput.style.borderColor = "#e53e3e";
        }
    });
</script>

</body>
</html>
