<!DOCTYPE html>
<html>
<head>
    <title>Luxury Home</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
            text-align: center;
        }

        header {
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .container {
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            margin: auto;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0f172a;
        }
    </style>

</head>

<body>

<header>
    <h1>Luxury Home 🏡</h1>
</header>

<div class="container">

    <div class="card">

        <img src="https://images.unsplash.com/photo-1613977257363-707ba9348227">

        <h2>Luxury House Design</h2>

        <p>
            High-end luxury house with premium materials, swimming pool,
            and elegant architecture.
        </p>

        <br>

        <a href="index.html">
            <button>⬅ Back to Home</button>
        </a>

    </div>

</div>

</body>
</html>
